<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radar Conductor Bogotá Login</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
.box{max-width:420px;margin:auto;background:#111827;padding:20px;border-radius:18px}
input,button{width:100%;padding:14px;margin-top:10px;border-radius:12px;border:0}
button{background:#facc15;font-weight:bold}
#app{display:none}
</style>
</head>
<body>

<div id="authScreen" class="box">
<h2>🚘 Radar Conductor Bogotá</h2>

<input id="authEmail" type="email" placeholder="Correo">
<input id="authPassword" type="password" placeholder="Contraseña">

<button onclick="loginUser()">Iniciar sesión</button>
<button onclick="registerUser()">Crear cuenta</button>
<button onclick="resetPassword()">Recuperar contraseña</button>

<p id="authMsg"></p>
</div>

<div id="app" class="box">
<h2>✅ Bienvenido</h2>
<p id="currentUserEmail"></p>
<button onclick="logoutUser()">Cerrar sesión</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDaQgkjo41WkNoXLdhXoSX48bmSyL29HVY",
authDomain: "radar-conductor-bogota.firebaseapp.com",
projectId: "radar-conductor-bogota",
storageBucket: "radar-conductor-bogota.firebasestorage.app",
messagingSenderId: "865533493546",
appId: "1:865533493546:web:76145dd1f681826608de53"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const usuariosPermitidos = [
"djonah08@gmail.com"
];

function showAuthMsg(text){
document.getElementById("authMsg").innerHTML = text;
}

window.registerUser = async function(){
const email=document.getElementById("authEmail").value.trim();
const password=document.getElementById("authPassword").value.trim();

if(password.length < 6){
showAuthMsg("La contraseña debe tener mínimo 6 caracteres.");
return;
}

try{
await createUserWithEmailAndPassword(auth,email,password);
showAuthMsg("✅ Cuenta creada.");
}catch(e){
showAuthMsg("❌ "+e.message);
}
}

window.loginUser = async function(){
const email=document.getElementById("authEmail").value.trim();
const password=document.getElementById("authPassword").value.trim();

if(!usuariosPermitidos.includes(email)){
alert("❌ Tu cuenta no tiene una suscripción activa.");
return;
}

try{
await signInWithEmailAndPassword(auth,email,password);
}catch(e){
showAuthMsg("❌ "+e.message);
}
}

window.logoutUser = async function(){
await signOut(auth);
}

window.resetPassword = async function(){
const email=document.getElementById("authEmail").value.trim();

if(!email){
showAuthMsg("Escribe tu correo.");
return;
}

try{
await sendPasswordResetEmail(auth,email);
showAuthMsg("📩 Correo enviado.");
}catch(e){
showAuthMsg("❌ "+e.message);
}
}

onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("authScreen").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("currentUserEmail").innerHTML=user.email;
}else{
document.getElementById("authScreen").style.display="block";
document.getElementById("app").style.display="none";
}
});
</script>

</body>
</html>
